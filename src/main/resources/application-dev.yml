spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  r2dbc:
    url: ${R2_DATABASE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  liquibase:
    enabled: true
  autoconfigure:
    exclude:
      - "org.springframework.cloud.client.discovery.simple.SimpleDiscoveryClientAutoConfiguration"
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:3}
      timeout: 60000

logging:
  level:
    liquibase: DEBUG
    org.springframework.boot.autoconfigure.liquibase: DEBUG
    com.zaxxer.hikari: INFO

server:
  port: ${SERVER_PORT:9000}

services:
  auth:
    url: http://auth-service-des.railway.internal:8080
  notification:
    url: http://notification-service-des.railway.internal:8080
  catalog:
    url: http://product-category-des.railway.internal:8080
  webapp:
    url: ${WEBAPP_URL:http://nx036-auth-des.railway.internal}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    issuer: ${JWT_ISSUER:mic-iamservice}
