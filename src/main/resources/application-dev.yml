spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  r2dbc:
    url: ${R2_DATABASE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  liquibase:
    enabled: true
  autoconfigure:
    exclude:
      - "org.springframework.cloud.client.discovery.simple.SimpleDiscoveryClientAutoConfiguration"
  data:
    redis:
      host: localhost
      port: 6380
      timeout: 60000

logging:
  level:
    liquibase: DEBUG
    org.springframework.boot.autoconfigure.liquibase: DEBUG
    com.zaxxer.hikari: INFO

server:
  port: 9000

services:
  auth:
    url: https://auth-service-des.up.railway.app

app:
  jwt:
    secret: dev-secret-key-change-me-in-production-must-be-256-bits-long
    expiration-ms: 86400000
    issuer: mic-iamservice
