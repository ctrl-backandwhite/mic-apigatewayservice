spring:
  # JDBC para Liquibase (migraciones DDL)
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/micgateway}
    username: ${POSTGRES_USER:dev_user}
    password: ${POSTGRES_PASSWORD:dev_password}
  # R2DBC para operaciones reactivas en runtime
  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://localhost:5432/micgateway}
    username: ${POSTGRES_USER:dev_user}
    password: ${POSTGRES_PASSWORD:dev_password}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 60000

services:
  config:
    url: http://localhost:8081

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-me-in-production-must-be-256-bits}
    expiration-ms: 3600000
    issuer: mic-iamservice
