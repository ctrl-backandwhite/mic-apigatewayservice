spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  r2dbc:
    url: ${R2_DATABASE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  liquibase:
    enabled: true
  autoconfigure:
    exclude:
      - "org.springframework.cloud.client.discovery.simple.SimpleDiscoveryClientAutoConfiguration"
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:3}
      timeout: 60000

logging:
  level:
    liquibase: DEBUG
    org.springframework.boot.autoconfigure.liquibase: DEBUG
    com.zaxxer.hikari: INFO

server:
  port: ${SERVER_PORT:9000}

services:
  auth:
    url: ${AUTH_SERVICE_URL:https://auth-service-des.up.railway.app}
  notification:
    url: ${NOTIFICATION_SERVICE_URL:}
  catalog:
    url: ${CATALOG_SERVICE_URL:}
  orders:
    url: ${ORDERS_SERVICE_URL:}
  payments:
    url: ${PAYMENTS_SERVICE_URL:}
  cms:
    url: ${CMS_SERVICE_URL:}
  webapp:
    url: ${WEBAPP_URL:}
  ecommerce:
    url: ${ECOMMERCE_URL:http://nx036-ecomerce.railway.internal:8080}

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-me-in-production-must-be-256-bits-long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    issuer: ${JWT_ISSUER:mic-iamservice}
