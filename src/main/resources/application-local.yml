spring:
  datasource:
    url: jdbc:postgresql://localhost:5403/db03
    username: user03
    password: pass03
  r2dbc:
    url: r2dbc:postgresql://localhost:5403/db03
    username: user03
    password: pass03
  liquibase:
    enabled: true
  autoconfigure:
    exclude:
      - "org.springframework.cloud.client.discovery.simple.SimpleDiscoveryClientAutoConfiguration"
  data:
    redis:
      host: localhost
      port: 6380
      timeout: 60000

logging:
  level:
    liquibase: DEBUG
    org.springframework.boot.autoconfigure.liquibase: DEBUG
    com.zaxxer.hikari: INFO

server:
  port: 9000

services:
  config:
    url: http://localhost:6001
  iam:
    url: http://localhost:6002

app:
  jwt:
    secret: local-secret-key-change-me-in-production-must-be-256-bits-long
    expiration-ms: 86400000
    issuer: mic-iamservice
