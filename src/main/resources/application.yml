server:
  port: ${SERVER_PORT:9000}
  netty:
    connection-timeout: 30s
    idle-timeout: 60s
  max-http-request-header-size: 16KB

spring:
  application:
    name: mic-gatewayservice
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:${PROFILES:local}},kibana
  main:
    web-application-type: reactive
  web:
    resources:
      add-mappings: false
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
            # Forward the original Host header (e.g. localhost:9000) to downstream services
            # so they generate correct redirect URLs (OAuth2 authorize → /login needs the
            # public host, not the internal Docker hostname).
            - PreserveHostHeader
          routes: []
          x-forwarded:
            enabled: true
            for-enabled: true
            host-enabled: true
            port-enabled: true
            proto-enabled: true
            prefix-enabled: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, gateway
  endpoint:
    gateway:
      enabled: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    issuer: ${JWT_ISSUER:mic-iamservice}
