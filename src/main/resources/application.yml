server:
  port: ${SERVER_PORT:9000}
  netty:
    connection-timeout: 30s
    idle-timeout: 60s
  max-http-request-header-size: 16KB

spring:
  application:
    name: mic-gatewayservice
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:${PROFILES:local}},kibana
  main:
    web-application-type: reactive
  web:
    resources:
      add-mappings: false
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
        # RewriteLocationResponseHeader removed intentionally: it always rewrites the
        # Location host to the gateway host (regardless of NEVER_STRIP/AS_IN_REQUEST,
        # which only affect the path version). That behavior breaks OAuth2 external
        # redirects, e.g. https://accounts.google.com/... would be rewritten to
        # https://localhost:9000/..., producing an ERR_SSL_PROTOCOL_ERROR in the browser.
      routes: []
      x-forwarded:
        enabled: true
        for-enabled: true
        host-enabled: true
        port-enabled: true
        proto-enabled: true
        prefix-enabled: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, gateway
  endpoint:
    gateway:
      enabled: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    issuer: ${JWT_ISSUER:mic-iamservice}
