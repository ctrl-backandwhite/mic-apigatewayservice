services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mic-apigatewayservice:local
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 9000
      POSTGRES_URL: jdbc:postgresql://host.docker.internal:5403/db03
      R2DBC_URL: r2dbc:postgresql://host.docker.internal:5403/db03
      POSTGRES_USER: user03
      POSTGRES_PASSWORD: pass03
      REDIS_HOST: host.docker.internal
      REDIS_PORT: 6380
      JWT_SECRET: dev-secret-key-change-me-in-production-must-be-256-bits
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9000:9000"
